naftiko: 1.0.0-alpha2
info:
  label: Workato MCP Server API — Policies
  description: 'Workato MCP Server API — Policies. 2 operations. Lead operation: Workato Get Server Policies. Self-contained
    Naftiko capability covering one Workato business surface.'
  tags:
  - Workato
  - Policies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKATO_API_KEY: WORKATO_API_KEY
capability:
  consumes:
  - type: http
    namespace: mcp-server-policies
    baseUri: https://www.workato.com
    description: Workato MCP Server API — Policies business capability. Self-contained, no shared references.
    resources:
    - name: api-mcp-mcp_servers-mcp_server_handle-server_policies
      path: /api/mcp/mcp_servers/{mcp_server_handle}/server_policies
      operations:
      - name: getmcpserverpolicies
        method: GET
        description: Workato Get Server Policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatemcpserverpolicies
        method: PUT
        description: Workato Update Server Policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKATO_API_KEY}}'
  exposes:
  - type: rest
    namespace: mcp-server-policies-rest
    port: 8080
    description: REST adapter for Workato MCP Server API — Policies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/mcp/mcp-servers/{mcp-server-handle}/server-policies
      name: api-mcp-mcp-servers-mcp-server-handle-server-policies
      description: REST surface for api-mcp-mcp_servers-mcp_server_handle-server_policies.
      operations:
      - method: GET
        name: getmcpserverpolicies
        description: Workato Get Server Policies
        call: mcp-server-policies.getmcpserverpolicies
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatemcpserverpolicies
        description: Workato Update Server Policies
        call: mcp-server-policies.updatemcpserverpolicies
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mcp-server-policies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workato MCP Server API — Policies. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: workato-get-server-policies
      description: Workato Get Server Policies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mcp-server-policies.getmcpserverpolicies
      outputParameters:
      - type: object
        mapping: $.
    - name: workato-update-server-policies
      description: Workato Update Server Policies
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mcp-server-policies.updatemcpserverpolicies
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
