naftiko: "1.0.0-alpha1"

info:
  label: "Workato Agent Studio API"
  description: "Workato Agent Studio API for managing AI genies, skills, and knowledge bases for agentic automation workflows."
  tags:
    - AI Agents
    - Agent Studio
    - Automation
    - Genies
    - Workato
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKATO_API_TOKEN: WORKATO_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: workato-agent-studio
      baseUri: https://www.workato.com
      description: "Workato Agent Studio API for AI genie and skill management"
      authentication:
        type: bearer
        token: "{{WORKATO_API_TOKEN}}"
      resources:
        - name: genies
          path: /api/agentic/genies
          description: "Workato AI genies"
          operations:
            - name: list-genies
              method: GET
              description: "List all AI genies"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-genie
              method: POST
              description: "Create a new AI genie"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"

        - name: genie-by-id
          path: /api/agentic/genies/{id}
          description: "Single genie operations"
          operations:
            - name: get-genie
              method: GET
              description: "Get a genie by ID"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: Genie ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-genie
              method: PUT
              description: "Update a genie"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: Genie ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-genie
              method: DELETE
              description: "Delete a genie"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: Genie ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: skills
          path: /api/agentic/skills
          description: "Workato AI skills"
          operations:
            - name: list-skills
              method: GET
              description: "List all AI skills"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-skill
              method: POST
              description: "Create a new AI skill"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

        - name: knowledge-bases
          path: /api/agentic/knowledge_bases
          description: "Workato knowledge bases"
          operations:
            - name: list-knowledge-bases
              method: GET
              description: "List all knowledge bases"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-knowledge-base
              method: POST
              description: "Create a new knowledge base"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

  exposes:
    - type: rest
      port: 8101
      namespace: workato-agent-studio-api
      resources:
        - path: /v1/genies
          name: genies
          operations:
            - method: GET
              name: list-genies
              description: "List AI genies"
              call: "workato-agent-studio.list-genies"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-genie
              description: "Create AI genie"
              call: "workato-agent-studio.create-genie"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/skills
          name: skills
          operations:
            - method: GET
              name: list-skills
              description: "List skills"
              call: "workato-agent-studio.list-skills"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/knowledge-bases
          name: knowledge-bases
          operations:
            - method: GET
              name: list-knowledge-bases
              description: "List knowledge bases"
              call: "workato-agent-studio.list-knowledge-bases"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: workato-agent-studio-mcp
      transport: http
      tools:
        - name: list-genies
          description: "List Workato AI genies"
          hints:
            readOnly: true
          call: "workato-agent-studio.list-genies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-genie
          description: "Get a Workato AI genie by ID"
          hints:
            readOnly: true
          call: "workato-agent-studio.get-genie"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-genie
          description: "Create a new Workato AI genie"
          hints:
            readOnly: false
          call: "workato-agent-studio.create-genie"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-skills
          description: "List Workato AI skills"
          hints:
            readOnly: true
          call: "workato-agent-studio.list-skills"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-knowledge-bases
          description: "List Workato knowledge bases"
          hints:
            readOnly: true
          call: "workato-agent-studio.list-knowledge-bases"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-knowledge-base
          description: "Create a new Workato knowledge base"
          hints:
            readOnly: false
          call: "workato-agent-studio.create-knowledge-base"
          outputParameters:
            - type: object
              mapping: "$."
