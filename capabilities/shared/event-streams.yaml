naftiko: "1.0.0-alpha1"

info:
  label: "Workato Event Streams API"
  description: "Workato Event Streams API for publishing and consuming messages from event topics, supporting single and batch message operations with long polling."
  tags:
    - Event Streams
    - Messaging
    - Pub/Sub
    - Workato
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKATO_API_TOKEN: WORKATO_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: workato-events
      baseUri: https://www.workato.com
      description: "Workato Event Streams API for pub/sub messaging"
      authentication:
        type: bearer
        token: "{{WORKATO_API_TOKEN}}"
      resources:
        - name: topic-publish
          path: /api/v1/topics/{topic_id}/publish
          description: "Publish single message to topic"
          operations:
            - name: publish-message
              method: POST
              description: "Publish a message to a topic"
              inputParameters:
                - name: topic_id
                  in: path
                  type: string
                  required: true
                  description: Topic ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  payload: "{{tools.payload}}"

        - name: topic-batch-publish
          path: /api/v1/batch/topics/{topic_id}/publish
          description: "Batch publish messages to topic"
          operations:
            - name: batch-publish-messages
              method: POST
              description: "Publish a batch of messages to a topic"
              inputParameters:
                - name: topic_id
                  in: path
                  type: string
                  required: true
                  description: Topic ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  messages: "{{tools.messages}}"

        - name: topic-consume
          path: /api/v1/topics/{topic_id}/consume
          description: "Consume messages from topic"
          operations:
            - name: consume-messages
              method: POST
              description: "Consume messages from a topic"
              inputParameters:
                - name: topic_id
                  in: path
                  type: string
                  required: true
                  description: Topic ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  timeout: "{{tools.timeout}}"

  exposes:
    - type: rest
      port: 8103
      namespace: workato-event-streams-api
      resources:
        - path: /v1/topics/{topic_id}/publish
          name: publish
          operations:
            - method: POST
              name: publish-message
              description: "Publish message to topic"
              call: "workato-events.publish-message"
              with:
                topic_id: "rest.topic_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/topics/{topic_id}/consume
          name: consume
          operations:
            - method: POST
              name: consume-messages
              description: "Consume messages from topic"
              call: "workato-events.consume-messages"
              with:
                topic_id: "rest.topic_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: workato-event-streams-mcp
      transport: http
      tools:
        - name: publish-message
          description: "Publish a message to a Workato event topic"
          hints:
            readOnly: false
          call: "workato-events.publish-message"
          with:
            topic_id: "tools.topic_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: batch-publish-messages
          description: "Publish a batch of messages to a Workato event topic"
          hints:
            readOnly: false
          call: "workato-events.batch-publish-messages"
          with:
            topic_id: "tools.topic_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: consume-messages
          description: "Consume messages from a Workato event topic"
          hints:
            readOnly: true
            openWorld: true
          call: "workato-events.consume-messages"
          with:
            topic_id: "tools.topic_id"
          outputParameters:
            - type: object
              mapping: "$."
