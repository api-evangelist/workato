naftiko: "1.0.0-alpha1"

info:
  label: "Workato MCP Server API"
  description: "Workato MCP Server API for creating and managing Model Context Protocol servers that expose Workato API collections as tools for AI agents."
  tags:
    - AI Agents
    - MCP
    - Model Context Protocol
    - Workato
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKATO_API_TOKEN: WORKATO_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: workato-mcp
      baseUri: https://www.workato.com
      description: "Workato MCP Server management API"
      authentication:
        type: bearer
        token: "{{WORKATO_API_TOKEN}}"
      resources:
        - name: mcp-servers
          path: /api/mcp/mcp_servers
          description: "MCP server management"
          operations:
            - name: list-mcp-servers
              method: GET
              description: "List MCP servers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-mcp-server
              method: POST
              description: "Create a new MCP server"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

        - name: mcp-server-by-handle
          path: /api/mcp/mcp_servers/{handle}
          description: "Single MCP server operations"
          operations:
            - name: get-mcp-server
              method: GET
              description: "Get an MCP server by handle"
              inputParameters:
                - name: handle
                  in: path
                  type: string
                  required: true
                  description: MCP server handle
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-mcp-server
              method: PUT
              description: "Update an MCP server"
              inputParameters:
                - name: handle
                  in: path
                  type: string
                  required: true
                  description: MCP server handle
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-mcp-server
              method: DELETE
              description: "Delete an MCP server"
              inputParameters:
                - name: handle
                  in: path
                  type: string
                  required: true
                  description: MCP server handle
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: mcp-server-tools
          path: /api/mcp/mcp_servers/{mcp_server_handle}/tools
          description: "MCP server tool management"
          operations:
            - name: list-server-tools
              method: GET
              description: "List tools for an MCP server"
              inputParameters:
                - name: mcp_server_handle
                  in: path
                  type: string
                  required: true
                  description: MCP server handle
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user-groups
          path: /api/mcp/user_groups
          description: "MCP user groups"
          operations:
            - name: list-user-groups
              method: GET
              description: "List user groups"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: workato-mcp-server-api
      resources:
        - path: /v1/mcp-servers
          name: mcp-servers
          operations:
            - method: GET
              name: list-mcp-servers
              description: "List MCP servers"
              call: "workato-mcp.list-mcp-servers"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-mcp-server
              description: "Create MCP server"
              call: "workato-mcp.create-mcp-server"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: workato-mcp-server-mcp
      transport: http
      tools:
        - name: list-mcp-servers
          description: "List Workato MCP servers"
          hints:
            readOnly: true
          call: "workato-mcp.list-mcp-servers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-mcp-server
          description: "Get a Workato MCP server by handle"
          hints:
            readOnly: true
          call: "workato-mcp.get-mcp-server"
          with:
            handle: "tools.handle"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-mcp-server
          description: "Create a new Workato MCP server"
          hints:
            readOnly: false
          call: "workato-mcp.create-mcp-server"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-server-tools
          description: "List tools configured on a Workato MCP server"
          hints:
            readOnly: true
          call: "workato-mcp.list-server-tools"
          with:
            mcp_server_handle: "tools.handle"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-user-groups
          description: "List Workato user groups"
          hints:
            readOnly: true
          call: "workato-mcp.list-user-groups"
          outputParameters:
            - type: object
              mapping: "$."
