      prefixed with /v1.
    resources:
    - path: /v1/api/mcp/mcp-servers/{handle}/assign-user-groups
      name: api-mcp-mcp-servers-handle-assign-user-groups
      description: REST surface for api-mcp-mcp_servers-handle-assign_user_groups.
      operations:
      - method: POST
        name: assignusergroupstomcpserver
        description: Workato Assign User Groups to an MCP Server
        call: mcp-server-user-groups.assignusergroupstomcpserver
        with:
