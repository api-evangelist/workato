naftiko: 1.0.0-alpha2
info:
  label: Workato MCP Server API — Tools
  description: 'Workato MCP Server API — Tools. 3 operations. Lead operation: Workato List MCP Server Tools. Self-contained
    Naftiko capability covering one Workato business surface.'
  tags:
  - Workato
  - Tools
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKATO_API_KEY: WORKATO_API_KEY
capability:
  consumes:
  - type: http
    namespace: mcp-server-tools
    baseUri: https://www.workato.com
    description: Workato MCP Server API — Tools business capability. Self-contained, no shared references.
    resources:
    - name: api-mcp-mcp_servers-mcp_server_handle-tools
      path: /api/mcp/mcp_servers/{mcp_server_handle}/tools
      operations:
      - name: listmcpservertools
        method: GET
        description: Workato List MCP Server Tools
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-mcp-mcp_servers-mcp_server_handle-tools-id
      path: /api/mcp/mcp_servers/{mcp_server_handle}/tools/{id}
      operations:
      - name: updatemcpservertool
        method: PUT
        description: Workato Update a Tool
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the tool.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removemcpservertool
        method: DELETE
        description: Workato Remove a Tool from MCP Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the tool to remove.
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKATO_API_KEY}}'
  exposes:
  - type: rest
    namespace: mcp-server-tools-rest
    port: 8080
    description: REST adapter for Workato MCP Server API — Tools. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/mcp/mcp-servers/{mcp-server-handle}/tools
      name: api-mcp-mcp-servers-mcp-server-handle-tools
      description: REST surface for api-mcp-mcp_servers-mcp_server_handle-tools.
      operations:
      - method: GET
        name: listmcpservertools
        description: Workato List MCP Server Tools
        call: mcp-server-tools.listmcpservertools
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/mcp/mcp-servers/{mcp-server-handle}/tools/{id}
      name: api-mcp-mcp-servers-mcp-server-handle-tools-id
      description: REST surface for api-mcp-mcp_servers-mcp_server_handle-tools-id.
      operations:
      - method: PUT
        name: updatemcpservertool
        description: Workato Update a Tool
        call: mcp-server-tools.updatemcpservertool
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removemcpservertool
        description: Workato Remove a Tool from MCP Server
        call: mcp-server-tools.removemcpservertool
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mcp-server-tools-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workato MCP Server API — Tools. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: workato-list-mcp-server-tools
      description: Workato List MCP Server Tools
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mcp-server-tools.listmcpservertools
      outputParameters:
      - type: object
        mapping: $.
    - name: workato-update-tool
      description: Workato Update a Tool
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mcp-server-tools.updatemcpservertool
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: workato-remove-tool-mcp-server
      description: Workato Remove a Tool from MCP Server
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: mcp-server-tools.removemcpservertool
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
