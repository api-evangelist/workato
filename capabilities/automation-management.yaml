naftiko: 1.0.0-alpha2
info:
  label: Workato Automation Management
  description: Unified capability for integration engineers and automation teams managing Workato recipes, data tables, event
    streams, and AI-powered agent workflows. Combines the Developer API, Agent Studio, Event Streams, and MCP Server APIs
    into a single automation operations workflow.
  tags:
  - AI Agents
  - Automation
  - Integration
  - iPaaS
  - Orchestration
  - Workato
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WORKATO_API_TOKEN: WORKATO_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: workato-developer
    baseUri: https://www.workato.com
    description: Workato Developer API for recipe and data table management
    authentication:
      type: bearer
      token: '{{WORKATO_API_TOKEN}}'
    resources:
    - name: recipes
      path: /api/recipes
      description: Workato automation recipes
      operations:
      - name: list-recipes
        method: GET
        description: List automation recipes
        inputParameters:
        - name: page
          in: query
          type: integer
          required: false
          description: Page number
        - name: per_page
          in: query
          type: integer
          required: false
          description: Items per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-recipe
        method: POST
        description: Create a new recipe
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
    - name: recipe-by-id
      path: /api/recipes/{id}
      description: Single recipe operations
      operations:
      - name: get-recipe
        method: GET
        description: Get a recipe by ID
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Recipe ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-recipe
        method: PUT
        description: Update a recipe
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Recipe ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: delete-recipe
        method: DELETE
        description: Delete a recipe
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Recipe ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recipe-start
      path: /api/recipes/{id}/start
      description: Start a recipe
      operations:
      - name: start-recipe
        method: PUT
        description: Start running a recipe
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Recipe ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recipe-stop
      path: /api/recipes/{id}/stop
      description: Stop a recipe
      operations:
      - name: stop-recipe
        method: PUT
        description: Stop a running recipe
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Recipe ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recipe-health
      path: /api/recipes/{recipe_id}/health
      description: Recipe health monitoring
      operations:
      - name: get-recipe-health
        method: GET
        description: Get recipe health report
        inputParameters:
        - name: recipe_id
          in: path
          type: integer
          required: true
          description: Recipe ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: data-tables
      path: /api/data_tables
      description: Workato data tables
      operations:
      - name: list-data-tables
        method: GET
        description: List all data tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-data-table
        method: POST
        description: Create a new data table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
  - type: http
    namespace: workato-agent-studio
    baseUri: https://www.workato.com
    description: Workato Agent Studio API for AI genie and skill management
    authentication:
      type: bearer
      token: '{{WORKATO_API_TOKEN}}'
    resources:
    - name: genies
      path: /api/agentic/genies
      description: Workato AI genies
      operations:
      - name: list-genies
        method: GET
        description: List all AI genies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-genie
        method: POST
        description: Create a new AI genie
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
    - name: genie-by-id
      path: /api/agentic/genies/{id}
      description: Single genie operations
      operations:
      - name: get-genie
        method: GET
        description: Get a genie by ID
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Genie ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-genie
        method: PUT
        description: Update a genie
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Genie ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: delete-genie
        method: DELETE
        description: Delete a genie
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Genie ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: skills
      path: /api/agentic/skills
      description: Workato AI skills
      operations:
      - name: list-skills
        method: GET
        description: List all AI skills
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-skill
        method: POST
        description: Create a new AI skill
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
    - name: knowledge-bases
      path: /api/agentic/knowledge_bases
      description: Workato knowledge bases
      operations:
      - name: list-knowledge-bases
        method: GET
        description: List all knowledge bases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-knowledge-base
        method: POST
        description: Create a new knowledge base
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
  - type: http
    namespace: workato-mcp
    baseUri: https://www.workato.com
    description: Workato MCP Server management API
    authentication:
      type: bearer
      token: '{{WORKATO_API_TOKEN}}'
    resources:
    - name: mcp-servers
      path: /api/mcp/mcp_servers
      description: MCP server management
      operations:
      - name: list-mcp-servers
        method: GET
        description: List MCP servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-mcp-server
        method: POST
        description: Create a new MCP server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
    - name: mcp-server-by-handle
      path: /api/mcp/mcp_servers/{handle}
      description: Single MCP server operations
      operations:
      - name: get-mcp-server
        method: GET
        description: Get an MCP server by handle
        inputParameters:
        - name: handle
          in: path
          type: string
          required: true
          description: MCP server handle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-mcp-server
        method: PUT
        description: Update an MCP server
        inputParameters:
        - name: handle
          in: path
          type: string
          required: true
          description: MCP server handle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: delete-mcp-server
        method: DELETE
        description: Delete an MCP server
        inputParameters:
        - name: handle
          in: path
          type: string
          required: true
          description: MCP server handle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mcp-server-tools
      path: /api/mcp/mcp_servers/{mcp_server_handle}/tools
      description: MCP server tool management
      operations:
      - name: list-server-tools
        method: GET
        description: List tools for an MCP server
        inputParameters:
        - name: mcp_server_handle
          in: path
          type: string
          required: true
          description: MCP server handle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-groups
      path: /api/mcp/user_groups
      description: MCP user groups
      operations:
      - name: list-user-groups
        method: GET
        description: List user groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: workato-events
    baseUri: https://www.workato.com
    description: Workato Event Streams API for pub/sub messaging
    authentication:
      type: bearer
      token: '{{WORKATO_API_TOKEN}}'
    resources:
    - name: topic-publish
      path: /api/v1/topics/{topic_id}/publish
      description: Publish single message to topic
      operations:
      - name: publish-message
        method: POST
        description: Publish a message to a topic
        inputParameters:
        - name: topic_id
          in: path
          type: string
          required: true
          description: Topic ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            payload: '{{tools.payload}}'
    - name: topic-batch-publish
      path: /api/v1/batch/topics/{topic_id}/publish
      description: Batch publish messages to topic
      operations:
      - name: batch-publish-messages
        method: POST
        description: Publish a batch of messages to a topic
        inputParameters:
        - name: topic_id
          in: path
          type: string
          required: true
          description: Topic ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            messages: '{{tools.messages}}'
    - name: topic-consume
      path: /api/v1/topics/{topic_id}/consume
      description: Consume messages from topic
      operations:
      - name: consume-messages
        method: POST
        description: Consume messages from a topic
        inputParameters:
        - name: topic_id
          in: path
          type: string
          required: true
          description: Topic ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            timeout: '{{tools.timeout}}'
  exposes:
  - type: rest
    port: 8080
    namespace: workato-automation-api
    description: Unified REST API for Workato automation management workflows.
    resources:
    - path: /v1/recipes
      name: recipes
      description: Automation recipes
      operations:
      - method: GET
        name: list-recipes
        description: List automation recipes
        call: workato-developer.list-recipes
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-recipe
        description: Create a new recipe
        call: workato-developer.create-recipe
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recipes/{id}
      name: recipe-by-id
      description: Single recipe management
      operations:
      - method: GET
        name: get-recipe
        description: Get a recipe
        call: workato-developer.get-recipe
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-recipe
        description: Delete a recipe
        call: workato-developer.delete-recipe
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recipes/{id}/start
      name: recipe-start
      operations:
      - method: PUT
        name: start-recipe
        description: Start a recipe
        call: workato-developer.start-recipe
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recipes/{id}/stop
      name: recipe-stop
      operations:
      - method: PUT
        name: stop-recipe
        description: Stop a recipe
        call: workato-developer.stop-recipe
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data-tables
      name: data-tables
      description: Data tables
      operations:
      - method: GET
        name: list-data-tables
        description: List data tables
        call: workato-developer.list-data-tables
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/genies
      name: genies
      description: AI genies
      operations:
      - method: GET
        name: list-genies
        description: List AI genies
        call: workato-agent-studio.list-genies
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/skills
      name: skills
      description: AI skills
      operations:
      - method: GET
        name: list-skills
        description: List AI skills
        call: workato-agent-studio.list-skills
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/knowledge-bases
      name: knowledge-bases
      description: Knowledge bases
      operations:
      - method: GET
        name: list-knowledge-bases
        description: List knowledge bases
        call: workato-agent-studio.list-knowledge-bases
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mcp-servers
      name: mcp-servers
      description: MCP servers
      operations:
      - method: GET
        name: list-mcp-servers
        description: List MCP servers
        call: workato-mcp.list-mcp-servers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/topics/{topic_id}/publish
      name: topic-publish
      description: Publish events
      operations:
      - method: POST
        name: publish-message
        description: Publish message to topic
        call: workato-events.publish-message
        with:
          topic_id: rest.topic_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: workato-automation-mcp
    transport: http
    description: MCP server for AI-assisted Workato automation management, recipe operations, and agentic workflow orchestration.
    tools:
    - name: list-recipes
      description: List Workato automation recipes with optional filtering
      hints:
        readOnly: true
        openWorld: true
      call: workato-developer.list-recipes
      outputParameters:
      - type: object
        mapping: $.
    - name: get-recipe
      description: Get a specific Workato recipe by ID
      hints:
        readOnly: true
      call: workato-developer.get-recipe
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-recipe
      description: Create a new Workato automation recipe
      hints:
        readOnly: false
      call: workato-developer.create-recipe
      outputParameters:
      - type: object
        mapping: $.
    - name: start-recipe
      description: Start a Workato recipe to begin processing triggers
      hints:
        readOnly: false
      call: workato-developer.start-recipe
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: stop-recipe
      description: Stop a running Workato recipe
      hints:
        readOnly: false
      call: workato-developer.stop-recipe
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-recipe-health
      description: Get health status report for a Workato recipe
      hints:
        readOnly: true
      call: workato-developer.get-recipe-health
      with:
        recipe_id: tools.recipe_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-data-tables
      description: List Workato data tables for structured data storage
      hints:
        readOnly: true
      call: workato-developer.list-data-tables
      outputParameters:
      - type: object
        mapping: $.
    - name: list-genies
      description: List Workato AI genies for agentic automation
      hints:
        readOnly: true
      call: workato-agent-studio.list-genies
      outputParameters:
      - type: object
        mapping: $.
    - name: get-genie
      description: Get a specific Workato AI genie by ID
      hints:
        readOnly: true
      call: workato-agent-studio.get-genie
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-genie
      description: Create a new Workato AI genie
      hints:
        readOnly: false
      call: workato-agent-studio.create-genie
      outputParameters:
      - type: object
        mapping: $.
    - name: list-skills
      description: List AI skills available for Workato genies
      hints:
        readOnly: true
      call: workato-agent-studio.list-skills
      outputParameters:
      - type: object
        mapping: $.
    - name: list-knowledge-bases
      description: List Workato knowledge bases for AI-powered lookups
      hints:
        readOnly: true
      call: workato-agent-studio.list-knowledge-bases
      outputParameters:
      - type: object
        mapping: $.
    - name: create-knowledge-base
      description: Create a new Workato knowledge base
      hints:
        readOnly: false
      call: workato-agent-studio.create-knowledge-base
      outputParameters:
      - type: object
        mapping: $.
    - name: list-mcp-servers
      description: List Workato MCP servers exposing API tools for AI agents
      hints:
        readOnly: true
      call: workato-mcp.list-mcp-servers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-mcp-server
      description: Create a new Workato MCP server for exposing API tools
      hints:
        readOnly: false
      call: workato-mcp.create-mcp-server
      outputParameters:
      - type: object
        mapping: $.
    - name: list-server-tools
      description: List tools configured on a Workato MCP server
      hints:
        readOnly: true
      call: workato-mcp.list-server-tools
      with:
        mcp_server_handle: tools.handle
      outputParameters:
      - type: object
        mapping: $.
    - name: publish-event
      description: Publish a message to a Workato event stream topic
      hints:
        readOnly: false
      call: workato-events.publish-message
      with:
        topic_id: tools.topic_id
      outputParameters:
      - type: object
        mapping: $.
    - name: consume-events
      description: Consume messages from a Workato event stream topic
      hints:
        readOnly: true
        openWorld: true
      call: workato-events.consume-messages
      with:
        topic_id: tools.topic_id
      outputParameters:
      - type: object
        mapping: $.
