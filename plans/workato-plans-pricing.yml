specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Workato
providerId: workato
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - iPaaS
  - Integration
  - Automation
description: Workato custom subscription pricing structured around recipes + tasks + connectors + seats.
sources:
  - https://www.workato.com/pricing
plans:
  - id: workato-base
    name: Base Workspace
    type: enterprise
    description: From ~$10,000/year base.
    entries:
      - label: Annual base
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '10000.00'
        userMultiplied: false
    elements:
      - name: Workato Workspace
      - name: Multi-user collaboration
      - name: Recipe + task counting
      - name: Standard connectors
  - id: workato-typical
    name: Typical Subscription
    type: enterprise
    description: Typically $15,000-$50,000/year for mid-market.
    entries:
      - label: Annual subscription
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: 15000.00-50000.00
        userMultiplied: false
    elements:
      - name: Recipes (workflows)
      - name: Tasks (actions inside recipes)
      - name: Premium connectors as add-on
      - name: User seats
  - id: workato-hvr
    name: High-Volume Recipes (HVR)
    type: metered
    description: Flat-rate recipes for high-task workloads.
    entries:
      - label: HVR add-on (custom)
        name: hvr
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Predictable cost for spiky usage
      - name: Flat-rate billing per HVR
      - name: Avoids task overage
  - id: workato-enterprise
    name: Enterprise
    type: enterprise
    description: Custom; on-prem agent, premium connectors, dedicated support.
    entries:
      - label: Annual (custom)
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: On-prem agent
      - name: Premium connectors
      - name: Dedicated CSM
      - name: SOC 2 Type 2 + HIPAA
      - name: Workbot for chat ops
